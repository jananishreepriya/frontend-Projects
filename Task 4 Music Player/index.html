<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Player | minimalist music</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="player-container">
        <div class="player-card">
            <div class="cover-art">
                <div class="vinyl"></div>
                <div class="cover-glow"></div>
            </div>
            <div class="song-info">
                <h2 id="song-title">Loading...</h2>
                <p id="song-artist">Artist</p>
            </div>
            <div class="progress-area">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="controls">
                <button id="prev" class="ctrl-btn">⏮</button>
                <button id="play-pause" class="ctrl-btn main-play">▶</button>
                <button id="next" class="ctrl-btn">⏭</button>
            </div>
            <div class="volume-row">
                <span>🔊</span>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
                <span id="autoplay-badge">⏵ autoplay</span>
            </div>
            <div class="playlist">
                <h3>Playlist</h3>
                <ul id="playlist-items"></ul>
            </div>
        </div>
    </div>
    <audio id="audio"></audio>
    <script src="js/script.js"></script>
</body>
</html>
